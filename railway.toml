[build]
builder = "nixpacks"

[deploy]
startCommand = "FLASK_APP=run.py flask db upgrade && python scripts/clear_data.py && gunicorn run:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT"
healthcheckPath = "/login"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
