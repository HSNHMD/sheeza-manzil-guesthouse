{% extends 'staff/base.html' %}

{% block title %}Staff Login — Sheeza Manzil{% endblock %}

{% block head_extra %}
<style>
  .login-outer {
    margin: -16px;
    min-height: calc(100vh - 60px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .login-card {
    background: #fff;
    border-radius: 18px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 28px rgba(26,46,74,0.12); /* navy with alpha — no var() for rgba() */
  }

  .login-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 4px;
  }

  .login-subtitle {
    font-size: 12px;
    color: #8a98b4;
    font-weight: 500;
    margin-bottom: 28px;
  }

  .lform-group {
    margin-bottom: 16px;
  }

  .lform-label {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8a98b4;
    margin-bottom: 6px;
  }

  .lform-input {
    display: block;
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e0e6f0;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Barlow', sans-serif;
    color: #1a1a2e;
    background: #fafbfd;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    box-sizing: border-box;
  }
  .lform-input:focus {
    outline: none;
    border-color: #1976d2;
    background: #fff;
  }

  .btn-login {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-login:hover   { background: var(--navy-mid); }
  .btn-login:active  { background: var(--navy-dark); }
</style>
{% endblock %}

{% block content %}
<div class="login-outer">
  <div class="login-card">
    <h1 class="login-title">Staff Login</h1>
    <p class="login-subtitle">Sheeza Manzil · Staff Portal</p>

    <form method="POST" action="{{ url_for('auth.console_login') }}">
      <div class="lform-group">
        <label class="lform-label" for="username">Username</label>
        <input class="lform-input" type="text" id="username" name="username"
               placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="lform-group">
        <label class="lform-label" for="password">Password</label>
        <input class="lform-input" type="password" id="password" name="password"
               placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
  </div>
</div>
{% endblock %}
