{% extends 'staff/base.html' %}

{% block title %}Staff Login — Sheeza Manzil{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
      <div class="mb-6 text-center">
        <div class="text-3xl mb-2">🏨</div>
        <h1 class="text-xl font-bold text-slate-800">Staff Portal</h1>
        <p class="text-sm text-slate-500 mt-1">Sheeza Manzil Guesthouse</p>
      </div>

      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
          <input type="text" name="username" required autofocus
                 class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" required
                 class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg
                       hover:bg-blue-700 transition-colors">
          Sign in
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
