<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Staff Portal{% endblock %} — Sheeza Manzil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c2128;
      --border: #30363d;
      --border-subtle: #21262d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.1);
      --amber-border: rgba(245,158,11,0.3);
      --emerald: #10b981;
      --emerald-bg: rgba(16,185,129,0.1);
      --emerald-border: rgba(16,185,129,0.3);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --red-border: rgba(239,68,68,0.3);
      --blue: #58a6ff;
      --blue-bg: rgba(88,166,255,0.1);
      --blue-border: rgba(88,166,255,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .staff-header {
      background: #010409;
      border-bottom: 1px solid var(--border-subtle);
      padding: 11px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 18px; line-height: 1; }

    .header-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #clock {
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .header-logout {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.15s, color 0.15s;
    }
    .header-logout:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .staff-content {
      max-width: 480px;
      margin: 0 auto;
    }

    .flash-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 16px 0;
    }

    .flash {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
      border: 1px solid;
    }
    .flash-success { background: var(--emerald-bg); color: #6ee7b7; border-color: var(--emerald-border); }
    .flash-error   { background: var(--red-bg);     color: #fca5a5; border-color: var(--red-border); }
    .flash-info    { background: var(--blue-bg);    color: #93c5fd; border-color: var(--blue-border); }
  </style>
</head>
<body>

  <header class="staff-header">
    <div class="header-brand">
      <span class="header-icon">🛏</span>
      <span class="header-title">Staff Room Control</span>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <a href="{{ url_for('staff.logout') }}" class="header-logout">Logout</a>
    </div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="staff-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    function updateClock() {
      const now = new Date();
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dayName = days[now.getDay()];
      const date = now.getDate();
      const month = months[now.getMonth()];
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent =
        `${dayName} ${date} ${month} · ${h}:${m} ${ampm}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
