{# Shared styles for the POS admin pages. Include via {% include '...' %}. #}
<style>
  .pos-shell { display: flex; flex-direction: column; gap: 14px; }
  .pos-h1 { font-size: 1.25rem; font-weight: 800; color: #0f172a; margin: 0; }
  .pos-sub { color: #64748b; font-size: 12.5px; }

  table.pos-table {
    width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;
    font-size: 13px;
  }
  table.pos-table th, table.pos-table td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0;
  }
  table.pos-table tr:last-child td { border-bottom: 0; }
  table.pos-table th {
    background: #f8fafc; font-weight: 700; color: #475569;
    text-transform: uppercase; font-size: 11px; letter-spacing: .04em;
  }
  table.pos-table td.num, table.pos-table th.num {
    text-align: right; font-feature-settings: 'tnum' on;
  }

  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
  }
  .pill.ok    { background: #dcfce7; color: #166534; }
  .pill.muted { background: #e2e8f0; color: #475569; }

  form.pos-form {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
  }
  form.pos-form label {
    font-size: 12px; font-weight: 600; color: #475569;
    display: block;
  }
  form.pos-form input[type=text],
  form.pos-form input[type=number],
  form.pos-form select,
  form.pos-form textarea {
    width: 100%; padding: 9px 10px; border-radius: 8px;
    border: 1px solid #cbd5e1; font-size: 14px; background: #fff;
  }
  form.pos-form .row {
    display: grid; gap: 10px; grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 600px) { form.pos-form .row { grid-template-columns: 1fr; } }

  .btn-primary {
    background: #0f766e; color: #fff; border: 1px solid #0f766e;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .btn-secondary {
    background: #fff; color: #475569; border: 1px solid #cbd5e1;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .pos-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
</style>
