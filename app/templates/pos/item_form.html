{% extends 'base.html' %}
{% block title %}{{ 'Edit Item' if item else 'New Item' }}{% endblock %}
{% block content %}
{% include 'pos/_styles.html' %}

<div class="pos-shell">
  <h1 class="pos-h1">{{ 'Edit ' + item.name if item else 'New POS item' }}</h1>

  <form method="POST" class="pos-form">
    <div>
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" maxlength="120" required
             value="{{ item.name if item else form.get('name', '') }}">
    </div>

    <div>
      <label for="description">Description</label>
      <input type="text" id="description" name="description" maxlength="500"
             value="{{ item.description if item else form.get('description', '') }}">
    </div>

    <div class="row">
      <div>
        <label for="category_id">Category *</label>
        <select id="category_id" name="category_id" required>
          {% for c in categories %}
          <option value="{{ c.id }}"
            {% if item and item.category_id == c.id %}selected{% elif form.get('category_id')|string == c.id|string %}selected{% endif %}>
            {{ c.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="default_item_type">Folio item type *</label>
        <select id="default_item_type" name="default_item_type">
          {% for t in pos_types %}
          <option value="{{ t }}"
            {% if item and item.default_item_type == t %}selected{% elif form.get('default_item_type') == t %}selected{% endif %}>
            {{ t }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label for="price">Price *</label>
        <input type="number" step="0.01" min="0" id="price" name="price" required
               value="{{ item.price if item else form.get('price', '') }}">
      </div>
      <div>
        <label for="sort_order">Sort order</label>
        <input type="number" id="sort_order" name="sort_order" min="0"
               value="{{ item.sort_order if item else form.get('sort_order', 100) }}">
      </div>
    </div>

    {% if item %}
    <div>
      <label style="display: inline-flex; align-items: center; gap: 6px;">
        <input type="checkbox" name="is_active" value="1" {% if item.is_active %}checked{% endif %}>
        Active
      </label>
    </div>
    {% endif %}

    <div class="pos-actions">
      <button type="submit" class="btn-primary">{{ 'Save' if item else 'Create' }}</button>
      <a href="{{ url_for('pos.items_list') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
