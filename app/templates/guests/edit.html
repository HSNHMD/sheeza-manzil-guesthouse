{% extends 'base.html' %}
{% block title %}Edit Guest — {{ guest.full_name }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-5">
    <a href="{{ next_url or url_for('bookings.index') }}" class="text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div>
      <h1 class="text-xl font-bold text-gray-800">Edit Guest</h1>
      <p class="text-xs text-gray-400">{{ guest.full_name }}</p>
    </div>
  </div>

  <form method="POST" class="space-y-5">
    <input type="hidden" name="next" value="{{ next_url }}">

    <!-- Name -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">Personal Details</h2>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name <span class="text-red-500">*</span></label>
            <input type="text" name="first_name" required value="{{ guest.first_name }}"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name <span class="text-red-500">*</span></label>
            <input type="text" name="last_name" required value="{{ guest.last_name }}"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            WhatsApp / Phone
            <span class="ml-1 text-xs font-normal text-green-600 bg-green-50 px-1.5 py-0.5 rounded">WhatsApp primary</span>
          </label>
          <div class="flex gap-2">
            <select id="phoneDialCode"
              class="w-44 px-2 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
            </select>
            <input type="tel" id="phoneLocal" placeholder="7375797"
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          </div>
          <input type="hidden" name="phone" id="phoneHidden" value="{{ guest.phone or '' }}">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" name="email" value="{{ guest.email or '' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nationality</label>
          <input type="text" name="nationality" id="nationalityInput" list="nationalityList"
            placeholder="Type to search..."
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <datalist id="nationalityList"></datalist>
        </div>
      </div>
    </div>

    <!-- ID -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">Identification</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ID Type</label>
          <select name="id_type"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Select...</option>
            <option value="passport"        {% if guest.id_type == 'passport' %}selected{% endif %}>Passport</option>
            <option value="national_id"     {% if guest.id_type == 'national_id' %}selected{% endif %}>National ID</option>
            <option value="driver_license"  {% if guest.id_type == 'driver_license' %}selected{% endif %}>Driver's License</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ID Number</label>
          <input type="text" name="id_number" value="{{ guest.id_number or '' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
    </div>

    <!-- Address & Notes -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">Address & Notes</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
          <textarea name="address" rows="2"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            placeholder="Street, City, Country">{{ guest.address or '' }}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
          <textarea name="notes" rows="2"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            placeholder="Allergies, preferences, VIP status...">{{ guest.notes or '' }}</textarea>
        </div>
      </div>
    </div>

    <div class="flex gap-3">
      <a href="{{ next_url or url_for('bookings.index') }}"
        class="flex-1 text-center px-4 py-3 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Cancel</a>
      <button type="submit"
        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-3 rounded-lg transition-colors">
        Save Guest
      </button>
    </div>
  </form>
</div>
<script src="{{ url_for('static', filename='js/country_fields.js') }}"></script>
<script>
  initPhoneField('phoneDialCode', 'phoneLocal', 'phoneHidden', '{{ guest.phone or "" }}');
  initNationalityField('nationalityInput', 'nationalityList', '{{ guest.nationality or "" }}');
</script>
{% endblock %}
