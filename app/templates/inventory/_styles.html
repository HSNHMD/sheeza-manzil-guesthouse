{# Shared styles for inventory admin pages — included via {% include '...' %}. #}
<style>
  .inv-shell { display: flex; flex-direction: column; gap: 14px; }
  .inv-h1 { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin: 0; }
  table.inv-table {
    width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;
    font-size: 13px;
  }
  table.inv-table th, table.inv-table td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0;
  }
  table.inv-table tr:last-child td { border-bottom: 0; }
  table.inv-table th {
    background: #f8fafc; font-weight: 600; color: #475569;
    text-transform: uppercase; font-size: 11px; letter-spacing: .04em;
  }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .pill.ok       { background: #dcfce7; color: #166534; }
  .pill.warn     { background: #fef3c7; color: #92400e; }
  .pill.bad      { background: #fee2e2; color: #991b1b; }
  .pill.muted    { background: #e2e8f0; color: #475569; }
  .pill.info     { background: #dbeafe; color: #1e40af; }

  form.inv-form { background: #fff; border: 1px solid #e2e8f0;
                  border-radius: 12px; padding: 18px;
                  display: flex; flex-direction: column; gap: 12px; }
  form.inv-form label { font-size: 12px; font-weight: 600; color: #475569; display: block; }
  form.inv-form input[type=text],
  form.inv-form input[type=number],
  form.inv-form input[type=date],
  form.inv-form select,
  form.inv-form textarea {
    width: 100%; padding: 9px 10px; border-radius: 8px;
    border: 1px solid #cbd5e1; font-size: 14px; background: #fff;
  }
  form.inv-form .row {
    display: grid; gap: 10px; grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 600px) { form.inv-form .row { grid-template-columns: 1fr; } }
  form.inv-form .checks { display: flex; flex-wrap: wrap; gap: 12px;
                          font-size: 13px; color: #334155; }
  form.inv-form .checks label { display: inline-flex; align-items: center; gap: 6px; }

  .inv-actions {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .btn-primary {
    background: #0f766e; color: #fff; border: 1px solid #0f766e;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .btn-secondary {
    background: #fff; color: #475569; border: 1px solid #cbd5e1;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .btn-danger {
    background: #dc2626; color: #fff; border: 1px solid #dc2626;
    padding: 6px 10px; border-radius: 6px; font-weight: 600; font-size: 12px;
    cursor: pointer;
  }
</style>
