{% extends 'base.html' %}
{% block title %}Login — Sheeza Manzil Guesthouse{% endblock %}
{% block login_content %}
<div class="w-full max-w-sm mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🏨</div>
      <h1 class="text-2xl font-bold text-gray-800">Sheeza Manzil Guesthouse</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required autofocus
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Enter your username">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Enter your password">
      </div>
      <div class="flex items-center">
        <input type="checkbox" name="remember" id="remember" class="w-4 h-4 text-blue-600 rounded">
        <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock login_content %}
