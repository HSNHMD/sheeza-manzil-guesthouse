{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <h1 class="text-xl font-bold text-gray-800">Change Password</h1>

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
        <input type="password" name="current_password" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Your current password">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" name="new_password" required minlength="6"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Min. 6 characters">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="6"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Repeat new password">
      </div>
      <div class="flex gap-3 pt-2">
        <a href="{{ url_for('dashboard.index') }}"
          class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
          Cancel
        </a>
        <button type="submit"
          class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition-colors">
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
