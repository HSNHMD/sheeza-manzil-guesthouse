{# Shared styles for /groups/* pages. Include via {% include '...' %}. #}
<style>
  .g-shell { display: flex; flex-direction: column; gap: 14px; }
  .g-h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin: 0; }
  .g-sub { color: #64748b; font-size: 12.5px; }

  table.g-table {
    width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;
    font-size: 13px;
  }
  table.g-table th, table.g-table td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0;
  }
  table.g-table tr:last-child td { border-bottom: 0; }
  table.g-table th {
    background: #f8fafc; font-weight: 700; color: #475569;
    text-transform: uppercase; font-size: 11px; letter-spacing: .04em;
  }
  table.g-table td.num, table.g-table th.num {
    text-align: right; font-feature-settings: 'tnum' on;
  }
  table.g-table tr.is-master td { background: #fef9c3; }

  .g-card {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
    padding: 14px;
  }

  .g-kpis {
    display: grid; gap: 8px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
  @media (max-width: 760px) { .g-kpis { grid-template-columns: repeat(2, 1fr); } }
  .g-kpi {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 2px;
  }
  .g-kpi .label { font-size: 10.5px; color: #64748b; text-transform: uppercase;
                  letter-spacing: 0.04em; font-weight: 700; }
  .g-kpi .value { font-size: 22px; font-weight: 800; color: #0f172a;
                  letter-spacing: -.01em; }
  .g-kpi .meta { font-size: 11px; color: #94a3b8; }

  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em;
  }
  .pill.ok       { background: #dcfce7; color: #166534; }
  .pill.muted    { background: #e2e8f0; color: #475569; }
  .pill.warn     { background: #fef3c7; color: #92400e; }
  .pill.bad      { background: #fee2e2; color: #991b1b; }
  .pill.master   { background: #fef9c3; color: #854d0e; border: 1px solid #fcd34d; }
  .pill.individual { background: #f1f5f9; color: #475569; }

  form.g-form { background: #fff; border: 1px solid #e2e8f0;
                 border-radius: 12px; padding: 18px;
                 display: flex; flex-direction: column; gap: 12px; }
  form.g-form label { font-size: 12px; font-weight: 600; color: #475569;
                       display: block; }
  form.g-form input, form.g-form select, form.g-form textarea {
    width: 100%; padding: 9px 10px; border-radius: 8px;
    border: 1px solid #cbd5e1; font-size: 14px; background: #fff;
  }
  form.g-form .row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 600px) { form.g-form .row { grid-template-columns: 1fr; } }

  .g-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn-primary {
    background: #0f766e; color: #fff; border: 1px solid #0f766e;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .btn-secondary {
    background: #fff; color: #475569; border: 1px solid #cbd5e1;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  .btn-danger {
    background: #fff; color: #b91c1c; border: 1px solid #fecaca;
    padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
    cursor: pointer;
  }
  form.inline { display: inline; margin: 0; }
</style>
